events {
    worker_connections 1024;
}
http {
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /api/ {
            proxy_pass http://backend:5000/api/;
        }
        location /health {
            proxy_pass http://backend:5000/health;
        }
    }
}